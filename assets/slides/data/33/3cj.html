<section class="eft-slide" aria-label="Emotion-Focused Therapy case conceptualisation and process">
  <div class="eft-stage" aria-label="Interactive therapy process chart">
    <div class="eft-drag-hint">Drag across the chart or time axis to follow therapy over time</div>
    <svg
      class="eft-chart"
      viewBox="0 0 1200 820"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      aria-label="Concentric ovals showing therapeutic change over time"
    ></svg>
    <div class="eft-tooltip" aria-hidden="true"></div>
  </div>

  <div class="eft-axis" aria-hidden="true">
    <div class="eft-axis__track">
      <div class="eft-axis__progress"></div>
      <div class="eft-axis__handle"></div>
    </div>
    <div class="eft-axis__labels">
      <span>Beginning of therapy</span>
      <span>Middle phase</span>
      <span>Later therapy</span>
    </div>
  </div>
</section>
