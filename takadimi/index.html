<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Takadimi Rhythm Builder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <main class="app">
        <header class="app-header">
          <div class="header-text">
            <p class="eyebrow">Takadimi Rhythm Builder</p>
          </div>
        </header>

        <details class="collapsible grid-section" open>
          <summary class="collapse-summary">Bar Editor</summary>
          <div class="collapse-body">
            <div class="section-controls">
              <section class="control-panel section-control-panel" aria-label="Bar actions">
                <div class="panel-controls">
                  <button id="addBarBtn" class="btn btn-primary" type="button">
                    Add Bar
                  </button>
                  <button id="clearBtn" class="btn ghost" type="button">Clear Draft</button>
                </div>
              </section>
            </div>
            <div class="grid-head">
              <div class="head-beats">
                <span>Beat 1</span>
                <span>Beat 2</span>
                <span>Beat 3</span>
                <span>Beat 4</span>
              </div>
            </div>
            <div id="rhythmGrid" class="rhythm-grid" aria-live="polite"></div>
          </div>
        </details>

        <details class="collapsible track-section" open>
          <summary class="collapse-summary">Song Track</summary>
          <div class="collapse-body">
            <div class="section-controls track-controls" aria-label="Playback and tempo controls">
              <section class="control-panel track-control-panel" aria-label="Playback controls">
                <p class="panel-label">Playback</p>
                <div class="panel-controls">
                  <button id="playBtn" class="btn btn-primary" type="button">Play</button>
                  <div class="mode-toggle" role="group" aria-label="Play mode">
                    <button
                      id="modeBarBtn"
                      class="toggle-btn"
                      type="button"
                      aria-pressed="false"
                    >
                      Bar
                    </button>
                    <button
                      id="modeSongBtn"
                      class="toggle-btn is-active"
                      type="button"
                      aria-pressed="true"
                    >
                      Song
                    </button>
                  </div>
                  <label class="switch-field switch-field--inline" for="autoscrollToggle">
                    <span>Autoscroll</span>
                    <input id="autoscrollToggle" type="checkbox" />
                  </label>
                </div>
              </section>

              <section class="control-panel track-control-panel" aria-label="Tempo controls">
                <p class="panel-label">Tempo</p>
                <div class="panel-controls track-tempo-controls">
                  <div class="tempo">
                    <label for="tempoInput">Tempo</label>
                    <div class="tempo-field">
                      <input
                        id="tempoInput"
                        type="number"
                        min="40"
                        max="220"
                        step="1"
                        value="90"
                      />
                      <span class="tempo-unit">BPM</span>
                    </div>
                  </div>
                  <div class="tempo tempo--wide">
                    <label for="metroVolume">Metronome</label>
                    <div class="tempo-field slider-field">
                      <input
                        id="metroVolume"
                        type="range"
                        min="0"
                        max="100"
                        value="30"
                      />
                      <span class="tempo-unit">Vol</span>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="track-header">
              <div class="track-meta">
                <div id="songCount" class="track-count">0 bars</div>
                <div id="editorStatus" class="track-status">
                  Editing draft bar (not in song)
                </div>
              </div>
            </div>

            <div id="trackActionGroups" class="track-action-groups" aria-label="Song controls">
              <details id="songActions" class="more-actions song-actions">
                <summary class="group-summary">Bar Edit and Song File Actions</summary>
                <div class="more-actions-body">
                  <section class="track-action-group" aria-label="Bar edit actions">
                    <p class="group-label">Bar Edit Actions</p>
                    <div class="track-actions track-actions--single-row track-actions--edit">
                      <button id="updateBarBtn" class="btn btn-primary" type="button">
                        Update Bar
                      </button>
                      <button id="duplicateBarBtn" class="btn ghost" type="button">
                        Duplicate
                      </button>
                      <button id="moveLeftBtn" class="btn ghost" type="button">
                        Move Up
                      </button>
                      <button id="moveRightBtn" class="btn ghost" type="button">
                        Move Down
                      </button>
                      <button id="deleteBarBtn" class="btn danger" type="button">
                        Delete
                      </button>
                    </div>
                  </section>

                  <section class="track-action-group" aria-label="Song file actions">
                    <p class="group-label">Song File Actions</p>
                    <div class="track-actions track-actions--single-row track-actions--file">
                      <button id="exportSongBtn" class="btn ghost" type="button">
                        Export File
                      </button>
                      <button id="importSongBtn" class="btn ghost" type="button">
                        Import File
                      </button>
                      <button id="clearSongBtn" class="btn danger" type="button">
                        Clear Song
                      </button>
                    </div>
                  </section>
                </div>
              </details>

              <input
                id="importSongInput"
                type="file"
                accept="application/json,.json"
                hidden
              />
            </div>

            <div id="songTrack" class="song-track"></div>
          </div>
        </details>

        <section class="output-section">
          <details class="collapsible output-group" open>
            <summary class="collapse-summary">Takadimi Output</summary>
            <div class="collapse-body">
              <div id="outputBeats" class="output-beats"></div>
            </div>
          </details>

          <details class="collapsible output-group">
            <summary class="collapse-summary">Sheet Music Notes</summary>
            <div class="collapse-body">
              <div id="sheetBeats" class="output-beats sheet-beats"></div>
            </div>
          </details>

        </section>
      </main>
    </div>

    <div id="uiStatusLive" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
